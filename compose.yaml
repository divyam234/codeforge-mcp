name: codeforge

services:
  codeforge:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${CODEFORGE_IMAGE:-codeforge-agent:latest}
    restart: unless-stopped
    environment:
      CODEFORGE_WORKSPACE_ROOT: /workspace
      CODEFORGE_STATE_DIR: /state
      CODEFORGE_COMMAND_POLICY: unrestricted
      CODEFORGE_SHELL: /bin/bash
      CODEFORGE_ALLOW_DELETE: "true"
      CODEFORGE_FOREGROUND_YIELD_MS: ${CODEFORGE_FOREGROUND_YIELD_MS:-10000}
      CODEFORGE_MAX_CONCURRENT_PROCESSES: ${CODEFORGE_MAX_CONCURRENT_PROCESSES:-8}
      CODEFORGE_PROCESS_TIMEOUT_SECONDS: ${CODEFORGE_PROCESS_TIMEOUT_SECONDS:-1800}
      CODEFORGE_HTTP_ADDRESS: ${CODEFORGE_HTTP_ADDRESS:-:9000}
      CODEFORGE_API_KEY: ${CODEFORGE_API_KEY:-}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/Warsaw}
    volumes:
      - type: bind
        source: ${PROJECTS_DIR:-./workspace}
        target: /workspace
      - type: volume
        source: codeforge-state
        target: /state
      - type: volume
        source: developer-home
        target: /home/dev
    ports:
      - "127.0.0.1:${CODEFORGE_HTTP_PORT:-9000}:9000"
    tmpfs:
      - /tmp:rw,exec,nosuid,size=2g
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x codeforge-mcp"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 10s
    stop_grace_period: 20s

volumes:
  codeforge-state:
    name: ${CODEFORGE_STATE_VOLUME:-codeforge-state}
  developer-home:
    name: ${CODEFORGE_HOME_VOLUME:-codeforge-home}
